<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>embeddedsearchengine.lugarerrado.com</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 3rem;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin: 2rem 0;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.75rem;
            color: #333;
            margin-bottom: .5rem;
        }
        .header p { color: #666; font-size: .9rem; }

        .project-selector {
            margin-bottom: 1rem;
        }
        .project-selector label {
            font-size: .85rem;
            color: #555;
            font-weight: 600;
            display: block;
            margin-bottom: .5rem;
        }
        .project-grid {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
        }
        .project-grid button {
            padding: 6px 14px;
            border: 1.5px solid #e0d8f0;
            background: #faf8ff;
            border-radius: 20px;
            font-size: .8rem;
            cursor: pointer;
            color: #555;
            transition: all .15s;
        }
        .project-grid button:hover {
            border-color: #764ba2;
            color: #764ba2;
        }
        .project-grid button.active {
            background: #764ba2;
            color: #fff;
            border-color: #764ba2;
        }
        .project-grid button.opt-data {
            background: #fff3e0;
            border-color: #ffcc80;
            color: #e65100;
        }
        .project-grid button.opt-data.active {
            background: #e65100;
            border-color: #e65100;
            color: #fff;
        }

        .gcse-search { width: 100%; }

        .history-section {
            margin-top: 1.5rem;
            border-top: 1px solid #eee;
            padding-top: 1.5rem;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: .75rem;
        }
        .history-header h2 {
            font-size: .95rem;
            color: #555;
            font-weight: 600;
        }
        .history-header button {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: .8rem;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .history-header button:hover { background: #f0f0f0; color: #e74c3c; }

        .history-group {
            margin-bottom: 1rem;
        }
        .history-group-title {
            font-size: .8rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: .4rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .history-group-title .badge {
            background: #f0ecfc;
            color: #764ba2;
            font-size: .7rem;
            padding: 1px 8px;
            border-radius: 10px;
        }
        .history-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
        }
        .history-list li {
            background: #f5f3ff;
            color: #764ba2;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: .82rem;
            cursor: pointer;
            transition: all .15s;
        }
        .history-list li:hover { background: #764ba2; color: #fff; }
        .history-list li .time {
            color: #bbb;
            font-size: .65rem;
            margin-left: 6px;
        }
        .history-list li:hover .time { color: rgba(255,255,255,.6); }
        .history-empty {
            color: #bbb;
            font-size: .85rem;
            font-style: italic;
            padding: .5rem 0;
        }

        .footer { text-align: center; margin-top: 2rem; color: #999; font-size: .8rem; }
        .footer a { color: #764ba2; text-decoration: none; }

        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            .header h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>embeddedsearchengine.lugarerrado.com</h1>
            <p>Mecanismo de busca embarcado &mdash; Motor de busca integrado para o ecossistema lugarerrado</p>
        </div>

        <div class="project-selector">
            <label>Projeto destino da pesquisa:</label>
            <div class="project-grid" id="projectGrid"></div>
        </div>

        <div class="gcse-search"></div>

        <div class="history-section">
            <div class="history-header">
                <h2>Historico de pesquisas</h2>
                <button onclick="clearHistory()">Limpar tudo</button>
            </div>
            <div id="historyContainer"></div>
        </div>

        <div class="footer">
            <a href="https://lugarerrado.com">lugarerrado.com</a>
        </div>
    </div>

    <script async src="https://cse.google.com/cse.js?cx=018262112823436926736:42mrje_mbne"></script>
    <script>
        var PROJETOS = ["Data", "feed", "insights", "challenge", "learning", "market", "appstore", "hub", "teams", "networking", "partnership", "troubleshooting", "endcustomer", "about", "admin", "embeddedsearchengine", "documentation"];
        var projetoAtivo = "Data";
        var capturou = false;

        function hoje() {
            return new Date().toISOString().slice(0, 10);
        }

        var API = 'https://documentation.lugarerrado.com/api/search-history';

        function getHistory() {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', API, false);
                xhr.send();
                if (xhr.status === 200) return JSON.parse(xhr.responseText);
            } catch(e) {}
            return {};
        }

        function saveHistoryRemoto(term, projeto) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify({ q: term, projeto: projeto }));
        }

        function addToHistory(term, projeto) {
            if (!term || !term.trim()) return;
            term = term.trim();
            if (!projeto) projeto = projetoAtivo;
            saveHistoryRemoto(term, projeto);
            setTimeout(renderHistory, 300);
        }

        function formatTime(ts) {
            var d = new Date(ts);
            var h = d.getHours().toString().padStart(2, '0');
            var m = d.getMinutes().toString().padStart(2, '0');
            return h + ':' + m;
        }

        function ativarProjeto(nome) {
            projetoAtivo = nome;
            document.querySelectorAll('.project-grid button').forEach(function(b) {
                b.classList.toggle('active', b.dataset.proj === nome);
            });
        }

        function criarBotoesProjeto() {
            var grid = document.getElementById('projectGrid');
            PROJETOS.forEach(function(p) {
                var btn = document.createElement('button');
                btn.textContent = p === "Data" ? "📅 " + hoje() : p;
                btn.dataset.proj = p;
                if (p === "Data") btn.classList.add('opt-data');
                btn.addEventListener('click', function() { ativarProjeto(p); });
                grid.appendChild(btn);
            });
            ativarProjeto("Data");
        }

        function renderHistory() {
            var container = document.getElementById('historyContainer');
            var data = getHistory();
            var total = Object.values(data).reduce(function(s, arr) { return s + arr.length }, 0);

            if (total === 0) {
                container.innerHTML = '<div class="history-empty">Nenhuma pesquisa ainda</div>';
                return;
            }

            var html = '';
            Object.keys(data).forEach(function(projeto) {
                var items = data[projeto];
                if (!items || !items.length) return;
                var exibir = items.slice(0, 10);
                html += '<div class="history-group">';
                html += '<div class="history-group-title">' + projeto + ' <span class="badge">ultimas ' + exibir.length + '</span></div>';
                html += '<ul class="history-list">';
                exibir.forEach(function(item) {
                    html += '<li onclick="pesquisar(\'' + item.q.replace(/'/g, "\\'") + '\')">' + item.q + ' <span class="time">' + formatTime(item.t) + '</span></li>';
                });
                html += '</ul></div>';
            });
            container.innerHTML = html;
        }

        function pesquisar(term) {
            var input = document.querySelector('.gsc-input input');
            if (input) {
                input.value = term;
                input.focus();
                var form = input.closest('form.gsc-search-box');
                if (form) {
                    var btn = form.querySelector('.gsc-search-button button');
                    if (btn) btn.click();
                }
            }
        }

        function clearHistory() {
            if (confirm('Limpar todo o historico de pesquisas?')) {
                saveHistory({});
                renderHistory();
            }
        }

        function capturarBusca() {
            var input = document.querySelector('.gsc-input input');
            if (!input) return;
            var val = input.value.trim();
            if (val) addToHistory(val, projetoAtivo);
        }

        function vigiarBusca() {
            if (capturou) return;
            var input = document.querySelector('.gsc-input input');
            if (!input) { setTimeout(vigiarBusca, 500); return; }

            var form = input.closest('form.gsc-search-box');
            if (!form) { setTimeout(vigiarBusca, 500); return; }

            capturou = true;

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') setTimeout(capturarBusca, 300);
            });

            var btn = form.querySelector('.gsc-search-button button');
            if (btn) {
                btn.addEventListener('click', function() { setTimeout(capturarBusca, 300); });
            }
        }

        window.addEventListener('load', function() {
            criarBotoesProjeto();
            renderHistory();
            setTimeout(vigiarBusca, 1000);
        });

        var obs = new MutationObserver(function() {
            if (!capturou) vigiarBusca();
        });
        obs.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
